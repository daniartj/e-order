{% extends 'base.html' %}
{% block title %}E-Order — Selamat Datang{% endblock %}

{% block content %}
<div class="relative min-h-screen flex flex-col items-center justify-center bg-primary overflow-hidden px-6">a
    <!-- Logo & Content -->
    <div
        x-data="{ tampil: false }"
        x-init="setTimeout(() => tampil = true, 100)"
        class="relative z-10 text-center"
    >
        <div
            x-show="tampil"
            x-transition:enter="transition ease-out duration-1000"
            x-transition:enter-start="opacity-0 translate-y-8 scale-95"
            x-transition:enter-end="opacity-100 translate-y-0 scale-100"
        >
            <!-- Logo Icon with glow/shadow -->
            <div class="w-48 h-48 flex items-center justify-center mx-auto mb-4 relative">
                <div class="absolute inset-0 animate-pulse"></div>
                <img src="{% load static %}{% static 'img/logo.png' %}" alt="E-Order" class="relative w-40 h-40 object-contain active:scale-95 transition-transform duration-300" />
            </div>

            <!-- Nama -->
            <h1 class="text-white text-4xl font-extrabold tracking-tight mb-2">
                E-Order
            </h1>
            <p class="text-white/60 text-xs tracking-widest uppercase mb-10">
                Sistem Pemesanan Digital
            </p>

            <!-- Card instruksi: Glassmorphism -->
            <div class="bg-white/5 border border-white/10 rounded-3xl p-6 backdrop-blur-md max-w-xs mx-auto shadow-premium">
                <div class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center mx-auto mb-3 text-2xl">
                    📱
                </div>
                <p class="text-white font-semibold text-base mb-1">
                    Cara Memesan
                </p>
                <p class="text-white/70 text-sm leading-relaxed">
                    Scan <span class="font-bold text-white">QR Code</span> di meja Anda untuk mulai memilih menu favorit dan melakukan pemesanan.
                </p>
            </div>

            <p class="text-white/30 text-xs mt-12 font-medium">
                E-Order &copy; 2026 — Powered by Django
            </p>
        </div>
    </div>
</div>
{% endblock %}
