{% extends 'base.html' %}
{% block title %}E-Order — Sesi Berakhir{% endblock %}

{% block content %}
<div class="min-h-screen bg-light flex items-center
            justify-center px-4">
    <div class="w-full max-w-sm">

        <div class="bg-white rounded-3xl shadow-card p-8 text-center">

            <div class="w-24 h-24 bg-red-100 rounded-full
                        flex items-center justify-center
                        mx-auto mb-6">
                <span class="text-5xl">⏰</span>
            </div>

            <h1 class="text-2xl font-extrabold text-primary mb-3">
                Sesi Berakhir
            </h1>

            <p class="text-muted text-sm leading-relaxed mb-8">
                Batas waktu akses Anda telah habis.
                Silahkan scan kembali
                <span class="font-semibold text-primary">QR Code</span>
                di meja Anda untuk memesan kembali.
            </p>

            <div class="bg-gray-50 rounded-2xl p-6 mb-6">
                <div class="text-6xl mb-3">📱</div>
                <p class="text-xs text-muted">
                    Arahkan kamera ke QR Code di meja Anda
                </p>
            </div>

        </div>

        <p class="text-center text-xs text-muted mt-6">
            E-Order &copy; 2025
        </p>

    </div>
</div>
{% endblock %}py
